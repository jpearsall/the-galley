name: CI

on:
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check scripts/

      - name: Format
        run: uv run ruff format --check scripts/

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --no-dev

      - name: Validate data file
        run: uv run python scripts/generate.py --check
