name: refresh-galley-data

on:
  schedule:
    - cron: "0 14 * * 0"   # every Sunday 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --no-dev

      - name: Refresh data file (validates; no-ops on failure)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GALLEY_MODEL: claude-sonnet-4-6
        run: uv run python scripts/generate.py

      - name: Open auto-merge PR if data changed
        env:
          # PAT from a real user so push + PR creation trigger CI workflows.
          # GITHUB_TOKEN (github-actions[bot]) suppresses workflow triggers
          # as an anti-recursion guard, so required checks would never report.
          GH_TOKEN: ${{ secrets.GALLEY_PUSH_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain data/galley-data.json)" ]]; then
            echo "no changes to commit"
            exit 0
          fi
          DATE="$(date -u +%F)"
          BRANCH="bot/data-refresh-${DATE}"
          git config user.name  "galley-bot"
          git config user.email "galley-bot@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add data/galley-data.json
          git commit -m "chore: weekly galley data refresh (${DATE})"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${BRANCH}" --force
          gh pr create \
            --title "chore: weekly galley data refresh (${DATE})" \
            --body "Automated weekly data refresh. CI validates the data file before auto-merge fires." \
            --base main \
            --head "${BRANCH}"
          gh pr merge --auto --squash --delete-branch "${BRANCH}"
